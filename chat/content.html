<h1>chat</h1>
<h2>{chat_count} active conversations</h2>
<br>

{notice}

<form id="chat-create-form" method="post" action="/chat" data-no-spa="1">
    <input type="hidden" name="action" value="create">
    <input id="chat-name" name="name" type="text" placeholder="recipient name" maxlength="120" autocomplete="off" required>
    <br><br>
    <button id="form-button" type="submit">create new chat</button>
</form>

<div class="chat-admin-list">
    {chat_cards}
</div>
