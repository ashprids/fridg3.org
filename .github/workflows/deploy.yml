name: deploy to fridg3.org

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-lint:
    name: code lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: set up php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: lint php files
        run: bash scripts/lint-php.sh

      - name: lint javascript files
        run: bash scripts/lint-javascript.sh

      - name: lint css files
        run: bash scripts/lint-css.sh

  deploy:
    if: github.event_name == 'push'
    needs: code-lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      # build step goes here if/when applicable

      - name: install rsync + ssh
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: set up ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 45.76.134.105 >> ~/.ssh/known_hosts

      - name: deploy with rsync
        env:
          REMOTE: deploy@45.76.134.105
          TARGET: /var/www/fridg3.org
          DEPLOY_DIR: .   
        run: |
          rsync -az --delete \
            --filter='merge .rsyncignore' \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "README.md" \
            --exclude "LICENSE" \
            --exclude ".gitignore" \
            "$DEPLOY_DIR"/ "$REMOTE":"$TARGET"/
