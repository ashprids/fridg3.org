<div class="frdgbeats-daw" id="frdgbeats-daw">
    <div class="fdgb-toolbar fdgb-panel">
        <button class="fdgb-app-title" id="fdgb-open-credits" type="button" data-tooltip="credits">frdgBeats</button>

        <div class="fdgb-transport" aria-label="transport controls">
            <button class="fdgb-button" id="fdgb-play" type="button" data-tooltip="play / pause"><i class="fa-solid fa-play"></i></button>
            <button class="fdgb-button" id="fdgb-stop" type="button" data-tooltip="stop"><i class="fa-solid fa-stop"></i></button>
            <button class="fdgb-button" id="fdgb-record" type="button" data-tooltip="record notes from keyboard"><i class="fa-solid fa-circle"></i></button>
        </div>

        <label class="fdgb-tempo">
            <span>bpm</span>
            <input id="fdgb-bpm" type="number" min="60" max="200" step="1" value="128">
        </label>

        <label class="fdgb-tempo">
            <span>beats</span>
            <select class="fdgb-select" id="fdgb-pattern-steps">
                <option value="16" selected>16</option>
                <option value="32">32</option>
            </select>
        </label>

        <button class="fdgb-button" id="fdgb-open-wiki" type="button" data-tooltip="open wiki"><i class="fa-solid fa-book-open"></i></button>

        <div class="fdgb-title-strip">
            <input class="fdgb-project-name" id="fdgb-project-name" type="text" value="Untitled" aria-label="project name">
            <div class="fdgb-status" id="fdgb-status">audio engine idle</div>
        </div>

        <div class="fdgb-master-strip">
            <label class="fdgb-master-volume">
                <span>master</span>
                <input class="fdgb-range" id="fdgb-master-volume" type="range" min="0" max="1" step="0.01" value="0.82">
            </label>
            <canvas class="fdgb-waveform" id="fdgb-waveform" width="150" height="30" aria-hidden="true"></canvas>
            <div class="fdgb-meter-shell" aria-hidden="true">
                <div class="fdgb-meter"><div class="fdgb-meter-fill" id="fdgb-meter-l"></div></div>
                <div class="fdgb-meter"><div class="fdgb-meter-fill" id="fdgb-meter-r"></div></div>
            </div>
        </div>
    </div>

    <div class="fdgb-main">
        <section class="fdgb-panel" aria-label="channel rack">
            <div class="fdgb-section-title">
                <span>channel rack</span>
                <button class="fdgb-button fdgb-mini-button" id="fdgb-add-channel" type="button" data-tooltip="add channel"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="fdgb-channel-list" id="fdgb-channel-list"></div>
        </section>

        <section class="fdgb-panel fdgb-editor" aria-label="pattern editor">
            <div class="fdgb-section-title">
                <div class="fdgb-tabs">
                    <button class="fdgb-tab is-active" id="fdgb-roll-tab" type="button">piano roll</button>
                    <button class="fdgb-tab" id="fdgb-playlist-tab" type="button">playlist</button>
                    <button class="fdgb-tab" id="fdgb-mixer-tab" type="button">mixer</button>
                    <button class="fdgb-tab" id="fdgb-automation-tab" type="button">automate</button>
                    <button class="fdgb-tab" id="fdgb-waveform-tab" type="button" disabled>waveform</button>
                    <button class="fdgb-tab" id="fdgb-synth-tab" type="button" disabled>synth</button>
                </div>
                <div class="fdgb-action-row">
                    <button class="fdgb-button" id="fdgb-save" type="button" data-tooltip="save browser project"><i class="fa-solid fa-floppy-disk"></i></button>
                    <button class="fdgb-button" id="fdgb-load" type="button" data-tooltip="load browser project"><i class="fa-solid fa-folder-open"></i></button>
                    <div class="fdgb-menu-wrap">
                        <button class="fdgb-button" id="fdgb-new-project" type="button" data-tooltip="new project"><i class="fa-solid fa-file"></i></button>
                        <div class="fdgb-menu fdgb-hidden" id="fdgb-presets-menu">
                            <button class="fdgb-menu-option" type="button" disabled>
                                <i class="fa-solid fa-spinner"></i>
                                <span><span class="fdgb-menu-title">loading presets</span><span class="fdgb-menu-desc">checking /tools/frdgbeats/presets</span></span>
                            </button>
                        </div>
                    </div>
                    <div class="fdgb-menu-wrap">
                        <button class="fdgb-button" id="fdgb-demos-menu-button" type="button" data-tooltip="load demos"><i class="fa-solid fa-list"></i></button>
                        <div class="fdgb-menu fdgb-hidden" id="fdgb-demos-menu">
                            <button class="fdgb-menu-option" type="button" disabled>
                                <i class="fa-solid fa-spinner"></i>
                                <span><span class="fdgb-menu-title">loading demos</span><span class="fdgb-menu-desc">checking /tools/frdgbeats/demos</span></span>
                            </button>
                        </div>
                    </div>
                    <div class="fdgb-menu-wrap">
                        <button class="fdgb-button" id="fdgb-global-soundfont" type="button" data-tooltip="set all SoundFont channels"><i class="fa-solid fa-keyboard"></i></button>
                        <div class="fdgb-menu fdgb-hidden" id="fdgb-soundfont-menu">
                            <button class="fdgb-menu-option" type="button" disabled>
                                <i class="fa-solid fa-spinner"></i>
                                <span><span class="fdgb-menu-title">loading soundfonts</span><span class="fdgb-menu-desc">checking /tools/frdgbeats/soundfonts</span></span>
                            </button>
                        </div>
                    </div>
                    <div class="fdgb-menu-wrap">
                        <button class="fdgb-button" id="fdgb-import-menu-button" type="button" data-tooltip="import options"><i class="fa-solid fa-file-import"></i></button>
                        <div class="fdgb-menu fdgb-hidden" id="fdgb-import-menu">
                            <button class="fdgb-menu-option" id="fdgb-import-project" type="button">
                                <i class="fa-solid fa-file-code"></i>
                                <span><span class="fdgb-menu-title">frdgBeats project</span><span class="fdgb-menu-desc">replace the current project with a saved frdgBeats file</span></span>
                            </button>
                            <button class="fdgb-menu-option" id="fdgb-import-midi" type="button">
                                <i class="fa-solid fa-music"></i>
                                <span><span class="fdgb-menu-title">MIDI file</span><span class="fdgb-menu-desc">replace the project with MIDI channels and playlist clips</span></span>
                            </button>
                        </div>
                    </div>
                    <div class="fdgb-menu-wrap">
                        <button class="fdgb-button" id="fdgb-export-menu-button" type="button" data-tooltip="export options"><i class="fa-solid fa-file-export"></i></button>
                        <div class="fdgb-menu fdgb-hidden" id="fdgb-export-menu">
                            <button class="fdgb-menu-option" id="fdgb-export-project" type="button">
                                <i class="fa-solid fa-file-code"></i>
                                <span><span class="fdgb-menu-title">frdgBeats project</span><span class="fdgb-menu-desc">save patterns, playlist clips, and instrument settings</span></span>
                            </button>
                            <button class="fdgb-menu-option" id="fdgb-export-midi" type="button">
                                <i class="fa-solid fa-file-audio"></i>
                                <span><span class="fdgb-menu-title">MIDI file</span><span class="fdgb-menu-desc">export arranged note data for another DAW</span></span>
                            </button>
                            <button class="fdgb-menu-option" id="fdgb-export-wav" type="button">
                                <i class="fa-solid fa-wave-square"></i>
                                <span><span class="fdgb-menu-title">WAV render</span><span class="fdgb-menu-desc">render the current arrangement to a stereo audio file</span></span>
                            </button>
                        </div>
                    </div>
                </div>
                <input class="fdgb-hidden" id="fdgb-project-file" type="file" accept=".frdgbeats,application/json">
                <input class="fdgb-hidden" id="fdgb-midi-file" type="file" accept=".mid,.midi,audio/midi,audio/x-midi">
                <input class="fdgb-hidden" id="fdgb-global-soundfont-file" type="file" accept=".sf2,audio/x-soundfont">
            </div>

            <div class="fdgb-editor-body" id="fdgb-roll-view">
                <div class="fdgb-roll-meta">
                    <div class="fdgb-selected-label" id="fdgb-selected-label">selected: drums</div>
                    <div class="fdgb-field-row">
                        <label class="fdgb-field">
                            <span>pattern</span>
                            <select class="fdgb-select" id="fdgb-pattern"></select>
                        </label>
                        <label class="fdgb-field">
                            <span>octave</span>
                            <select class="fdgb-select" id="fdgb-octave">
                                <option value="1">1</option>
                                <option value="2" selected>2</option>
                                <option value="3">3</option>
                            </select>
                        </label>
                        <label class="fdgb-field">
                            <span>snap</span>
                            <select class="fdgb-select" id="fdgb-note-snap">
                                <option value="1">1</option>
                                <option value="0.5" selected>1/2</option>
                                <option value="0.25">1/4</option>
                            </select>
                        </label>
                        <button class="fdgb-button" id="fdgb-octave-down" type="button" data-tooltip="move pattern notes down one octave"><i class="fa-solid fa-arrow-down"></i></button>
                        <button class="fdgb-button" id="fdgb-octave-up" type="button" data-tooltip="move pattern notes up one octave"><i class="fa-solid fa-arrow-up"></i></button>
                        <button class="fdgb-button" id="fdgb-clear-pattern" type="button" data-tooltip="clear selected pattern"><i class="fa-solid fa-eraser"></i></button>
                    </div>
                </div>
                <div class="fdgb-piano-roll" id="fdgb-piano-roll"></div>
            </div>

            <div class="fdgb-editor-body fdgb-hidden" id="fdgb-playlist-view">
                <div class="fdgb-roll-meta">
                    <div class="fdgb-selected-label">arrangement</div>
                    <button class="fdgb-button" id="fdgb-clear-playlist" type="button" data-tooltip="clear arrangement"><i class="fa-solid fa-eraser"></i></button>
                </div>
                <div class="fdgb-playlist-tools" id="fdgb-playlist-tools"></div>
                <div class="fdgb-playlist-wrap">
                    <div class="fdgb-playlist" id="fdgb-playlist"></div>
                </div>
            </div>

            <div class="fdgb-editor-body fdgb-hidden" id="fdgb-mixer-view">
                <div class="fdgb-roll-meta">
                    <div class="fdgb-selected-label" id="fdgb-mixer-label">mixer</div>
                    <div class="fdgb-field-row">
                        <select class="fdgb-select" id="fdgb-effect-picker" aria-label="effect type"></select>
                        <button class="fdgb-button" id="fdgb-add-effect" type="button" data-tooltip="add effect"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="fdgb-mixer" id="fdgb-mixer"></div>
            </div>

            <div class="fdgb-editor-body fdgb-hidden" id="fdgb-automation-view">
                <div class="fdgb-roll-meta">
                    <div class="fdgb-selected-label" id="fdgb-automation-label">automation</div>
                    <div class="fdgb-field-row">
                        <label class="fdgb-field">
                            <span>pattern</span>
                            <select class="fdgb-select" id="fdgb-automation-pattern" aria-label="automation pattern"></select>
                        </label>
                        <select class="fdgb-select" id="fdgb-automation-target" aria-label="automation target"></select>
                        <button class="fdgb-button" id="fdgb-add-automation" type="button" data-tooltip="add automation lane"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="fdgb-automation" id="fdgb-automation"></div>
            </div>

            <div class="fdgb-editor-body fdgb-hidden" id="fdgb-waveform-view">
                <div class="fdgb-roll-meta">
                    <div class="fdgb-selected-label" id="fdgb-waveform-label">waveform</div>
                    <div class="fdgb-field-row">
                        <button class="fdgb-button" id="fdgb-sample-zoom-out" type="button" data-tooltip="zoom out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                        <button class="fdgb-button" id="fdgb-sample-zoom-reset" type="button" data-tooltip="reset zoom"><i class="fa-solid fa-expand"></i></button>
                        <button class="fdgb-button" id="fdgb-sample-zoom-in" type="button" data-tooltip="zoom in"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                        <button class="fdgb-button" id="fdgb-remove-sample-zone" type="button" data-tooltip="remove selected note zone"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
                <div class="fdgb-sample-editor">
                    <canvas class="fdgb-sample-canvas" id="fdgb-sample-canvas" width="900" height="300" aria-label="sample waveform editor"></canvas>
                    <input class="fdgb-range fdgb-sample-scroll" id="fdgb-sample-scroll" type="range" min="0" max="1" step="0.001" value="0" aria-label="waveform horizontal scroll">
                    <div class="fdgb-sample-editor-status" id="fdgb-sample-editor-status">drag the top handles to trim, drag the lower lane to map notes</div>
                </div>
            </div>

            <div class="fdgb-editor-body fdgb-hidden" id="fdgb-synth-view">
                <div class="fdgb-roll-meta">
                    <div class="fdgb-selected-label" id="fdgb-synth-label">synth</div>
                </div>
                <div class="fdgb-synth-editor" id="fdgb-synth-editor"></div>
            </div>
        </section>
    </div>
</div>

<script src="/tools/frdgbeats/frdgbeats.js"></script>
