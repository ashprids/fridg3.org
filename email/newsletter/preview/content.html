<h1>newsletter preview</h1>
<p>review the generated newsletter markup. use the back button to edit and regenerate.</p>

<div class="preview-controls">
  <button id="back_btn">&#8592; go back</button>
  <span id="preview_status"></span>
</div>

<div id="preview_frame" class="preview-frame"></div>

<style>
  .preview-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 16px 0;
  }
  #back_btn {
    background: linear-gradient(120deg, rgba(70, 70, 70, 0.3), rgba(130, 130, 130, 0.24));
    color: #ededed;
    border: 1px solid rgba(110, 110, 110, 0.7);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    font-family: 'MainBold', monospace;
    transition: background 0.2s ease, transform 0.1s ease, border-color 0.2s ease;
  }
  #back_btn:hover {
    background: linear-gradient(120deg, rgba(95, 95, 95, 0.36), rgba(145, 145, 145, 0.3));
    border-color: rgba(220, 220, 220, 0.85);
  }
  #back_btn:active {
    transform: translateY(1px);
  }
  #preview_status {
    color: #9a9a9a;
    font-family: 'MainRegular', monospace;
    font-size: 13px;
  }
  .preview-frame {
    min-height: 320px;
    background: rgba(10, 10, 10, 0.95);
    border: 1px solid rgba(90, 90, 90, 0.35);
    border-radius: 10px;
    padding: 14px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    overflow-x: auto;
  }
</style>

<script>
  const STORAGE_KEY = 'newsletterBuilderDraft';
  const backBtn = document.getElementById('back_btn');
  const statusEl = document.getElementById('preview_status');
  const frame = document.getElementById('preview_frame');

  backBtn.addEventListener('click', () => {
    window.location.href = '/email/newsletter/create/';
  });

  const loadPreview = () => {
    let draft = null;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) draft = JSON.parse(raw);
    } catch (err) {
      console.warn('Unable to read draft', err);
    }

    if (!draft) {
      statusEl.textContent = 'no saved draft found. go back and generate first.';
      frame.textContent = '';
      return;
    }

    const filled = draft.filledHtml || '';
    if (!filled.trim()) {
      statusEl.textContent = 'draft found, but no generated HTML yet. go back and click Generate / Open preview again.';
      frame.textContent = '';
      return;
    }

    statusEl.textContent = 'previewing your saved draft.';
    frame.innerHTML = filled;
  };

  loadPreview();
</script>
