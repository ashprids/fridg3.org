<h1>edit journal post</h1>
<h2>edit title, description, and raw HTML content</h2>
<br>
<form id="create-post-form" method="POST">
<input type="hidden" name="post" value="{post_id}">
<input id="textbox" type="text" name="title" placeholder="title" value="{title_value}">
<br><br>
<textarea id="textbox" class="large" name="description" placeholder="description" style="height: 54px;">{description_value}</textarea>
<br><br>
<textarea id="textbox" class="large" name="content" placeholder="raw html content" style="height: 380px;">{content_value}</textarea>
<br><br>
<button id="two-buttons" type="button" data-tooltip="save draft + open preview">preview</button><button id="two-buttons" type="submit">save changes</button>
</form>

<style>
#create-post-form textarea[name="content"] {
	line-height: 1.6;
	tab-size: 2;
	white-space: pre-wrap;
	overflow-wrap: break-word;
	word-break: break-word;
}
</style>

<script>
(function() {
	function initJournalEditForm() {
		var form = document.getElementById('create-post-form');
		if (!form) return;
		if (form.dataset.journalEditInit === '1') return;
		form.dataset.journalEditInit = '1';

		var contentInput = form.querySelector('textarea[name="content"]');

		function formatHtml(html) {
			var input = (html || '').replace(/\r\n/g, '\n');
			if (!input.trim()) return '';

			var withBreaks = input
				.replace(/<br\s*\/?>/gi, '\n<br>\n')
				.replace(/>\s*</g, '>\n<')
				.replace(/<\/(h3|h4|h5)>\s*(?!\n)/gi, function(m) {
					return m + '\n';
				})
				.replace(/\n{3,}/g, '\n\n');

			var lines = withBreaks.split('\n');
			var indent = 0;
			var out = [];
			var selfClosing = /<\s*(br|hr|img|input|meta|link|source|track|wbr)\b/i;

			for (var i = 0; i < lines.length; i++) {
				var raw = lines[i].trim();
				if (!raw) continue;

				var isClosing = /^<\//.test(raw);
				var isComment = /^<!--/.test(raw);
				var isDoctype = /^<!doctype/i.test(raw);
				var isTag = /^<[^>]+>$/.test(raw);
				var closesOnSameLine = /^<[^/!][^>]*>.*<\/[a-zA-Z0-9:_-]+>$/.test(raw);
				var endsSelf = /\/>$/.test(raw) || selfClosing.test(raw);

				if (isClosing && indent > 0) indent--;

				var pad = new Array(indent + 1).join('  ');
				out.push(pad + raw);

				if (isTag && !isClosing && !isComment && !isDoctype && !endsSelf && !closesOnSameLine) {
					indent++;
				}
			}

			return out.join('\n');
		}

		if (contentInput) {
			contentInput.value = formatHtml(contentInput.value);
		}

		var previewButton = form.querySelector('button[type="button"]');
		if (!previewButton) return;

		var addOrUpdateHidden = function(name, value) {
			var input = form.querySelector('input[name="' + name + '"]');
			if (!input) {
				input = document.createElement('input');
				input.type = 'hidden';
				input.name = name;
				form.appendChild(input);
			}
			input.value = value;
		};

		previewButton.addEventListener('click', function(e) {
			e.preventDefault();
			addOrUpdateHidden('save_draft', '1');
			addOrUpdateHidden('open_preview', '1');
			if (typeof form.requestSubmit === 'function') {
				form.requestSubmit();
			} else {
				form.submit();
			}
		});
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', initJournalEditForm, { once: true });
	} else {
		initJournalEditForm();
	}
})();
</script>
