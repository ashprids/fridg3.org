<article id="journal-article">
    <header id="journal-article-header">
        <h1 id="journal-article-title">{title}</h1>
        <p id="journal-article-subtitle">{subtitle}</p>
        <div id="journal-article-meta">
            <time id="journal-article-date">{date}</time>
            <span id="journal-article-sep">•</span>
            <a id="journal-preview-back" href="{back_href}">back to editor</a>
        </div>
    </header>
    <section id="journal-article-content">
        {content}
    </section>
</article>

<style>
    #journal-article {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    #journal-article-header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
    }

    #journal-article-title {
        margin: 0;
        font-size: 24px;
        line-height: 1.25;
    }

    #journal-article-subtitle {
        margin: 0;
        font-family: "MainItalic", monospace;
        font-size: 14px;
        line-height: 1.5;
        color: var(--subtle);
    }

    #journal-article-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    #journal-article-date,
    #journal-article-sep {
        font-family: "MainItalic", monospace;
        font-size: 12px;
        color: var(--subtle);
    }

    #journal-preview-back {
        font-family: "MainItalic", monospace;
        font-size: 12px;
        color: var(--links);
        text-decoration: underline;
        text-underline-offset: 2px;
    }

    #journal-article-content {
        font-size: 15px;
        line-height: 1.7;
    }

    #journal-article-content > :first-child {
        margin-top: 0;
    }

    #journal-article-content > :last-child {
        margin-bottom: 0;
    }

    #journal-article-content p,
    #journal-article-content ul,
    #journal-article-content ol,
    #journal-article-content pre,
    #journal-article-content blockquote {
        margin-top: 12px;
        margin-bottom: 12px;
    }

    #journal-article-content li {
        margin-bottom: 6px;
    }

    #journal-article-content blockquote {
        margin-left: 0;
        padding-left: 12px;
        border-left: 2px solid var(--border);
        color: var(--subtle);
    }

    #journal-article-content h2,
    #journal-article-content h3,
    #journal-article-content h4,
    #journal-article-content h5 {
        line-height: 1.35;
        margin-top: 24px;
        margin-bottom: 10px;
    }

    #journal-article-content a {
        text-decoration: underline;
        text-underline-offset: 2px;
    }

    #journal-article-content img {
        max-width: 100%;
        height: auto;
    }

    #journal-article-content hr {
        margin: 20px 0;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var subtitle = document.getElementById('journal-article-subtitle');
    if (subtitle && !subtitle.textContent.trim()) {
        subtitle.style.display = 'none';
    }

    var links = document.querySelectorAll('#journal-article-content a');
    links.forEach(function(link) {
        var href = link.getAttribute('href');
        if (href) {
            link.setAttribute('data-tooltip', href);
        }
    });

    if (typeof hljs !== 'undefined') {
        document.querySelectorAll('#journal-article-content pre code').forEach(function(block) {
            hljs.highlightElement(block);
        });
    }
});
</script>
